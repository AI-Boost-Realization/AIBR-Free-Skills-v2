name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mcp-server-tests:
    name: MCP Server (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers/session-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-servers/session-sync/package-lock.json
      - run: npm ci
      - run: npm test

  orchestrator-tests:
    name: Orchestrator (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v

  install-check:
    name: Install Script (dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p ~/.claude
      - run: bash install.sh --dry-run
